<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Mecánica Bergesio · Inicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0c0f15;
            color: #f0f4ff;
            overflow-x: hidden;
            line-height: 1.5;
            min-height: 100vh;
        }

        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0b1120, #1a1f2e, #0f1a2b);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.1);
            animation: floatParticle linear infinite alternate;
        }
        .particle:nth-child(1) { width: 180px; height: 180px; top: 5%; left: 2%; animation-duration: 22s; }
        .particle:nth-child(2) { width: 250px; height: 250px; bottom: 8%; right: 3%; animation-duration: 28s; animation-delay: 1s; }
        .particle:nth-child(3) { width: 120px; height: 120px; top: 25%; right: 15%; animation-duration: 18s; animation-delay: 2s; }
        .particle:nth-child(4) { width: 300px; height: 300px; bottom: 30%; left: -5%; animation-duration: 32s; animation-delay: 0.5s; }
        .particle:nth-child(5) { width: 140px; height: 140px; top: 70%; left: 20%; animation-duration: 20s; animation-delay: 3s; }
        .particle:nth-child(6) { width: 200px; height: 200px; top: 10%; left: 60%; animation-duration: 26s; animation-delay: 1.5s; }

        @keyframes floatParticle {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.4; }
            25% { transform: translate(40px, -30px) scale(1.2) rotate(5deg); opacity: 0.7; }
            50% { transform: translate(-20px, 50px) scale(0.9) rotate(-3deg); opacity: 0.5; }
            75% { transform: translate(30px, 20px) scale(1.1) rotate(4deg); opacity: 0.8; }
            100% { transform: translate(-40px, -40px) scale(1) rotate(0deg); opacity: 0.4; }
        }

        .content {
            position: relative;
            z-index: 5;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.8rem;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 4rem;
            animation: slideDown 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            transition: all 0.3s ease;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        .header:hover {
            border-color: rgba(0, 180, 255, 0.3);
            box-shadow: 0 20px 45px rgba(0, 100, 255, 0.15);
            transform: translateY(-2px);
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        .logo a {
            color: #f0f4ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo .logo-icon {
            color: #3b9eff;
            font-size: 2rem;
            animation: pulseIcon 2.4s ease-in-out infinite;
        }
        @keyframes pulseIcon {
            0% { transform: scale(1) rotate(0deg); text-shadow: 0 0 0 #3b9eff; }
            50% { transform: scale(1.2) rotate(8deg); text-shadow: 0 0 20px #3b9eff; }
            100% { transform: scale(1) rotate(0deg); text-shadow: 0 0 0 #3b9eff; }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            font-weight: 500;
        }
        .nav-links a {
            color: #b0c7e7;
            text-decoration: none;
            transition: 0.25s;
            position: relative;
            padding: 0.3rem 0;
        }
        .nav-links a:hover {
            color: #fff;
            transform: translateY(-2px);
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #3b9eff;
            transition: 0.3s;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .nav-links a.active {
            color: #fff;
        }
        .nav-links a.active::after {
            width: 100%;
        }

        .btn-outline {
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-outline:hover {
            background: #3b9eff;
            border-color: #3b9eff;
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(59, 158, 255, 0.3);
        }

        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            margin: 2rem 0 4rem;
            animation: fadeInUp 1s ease 0.2s both;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hero-text {
            flex: 1 1 450px;
        }
        .hero-text .badge {
            display: inline-block;
            background: rgba(59, 158, 255, 0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            border: 1px solid rgba(59, 158, 255, 0.2);
            backdrop-filter: blur(4px);
            margin-bottom: 1.2rem;
        }
        .hero-text h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
        }

        .hero-text h1 .highlight {
            color: var(--highlight-color, #3b9eff) !important;
            font-weight: 800;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: #b6c9ec;
            max-width: 500px;
            margin-bottom: 2.5rem;
        }
        .cta-group {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b9eff, #7c6af0);
            border: none;
            padding: 0.9rem 2.8rem;
            border-radius: 60px;
            font-weight: 700;
            color: #fff;
            font-size: 1rem;
            box-shadow: 0 12px 30px rgba(59, 158, 255, 0.3);
            transition: 0.3s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 18px 40px rgba(59, 158, 255, 0.5);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.9rem 2.4rem;
            border-radius: 60px;
            font-weight: 600;
            color: #f0f4ff;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-4px);
            border-color: #3b9eff;
        }
        .hero-visual {
            flex: 1 1 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 280px;
        }
        .orb {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 30% 30%, #3b9eff, #1b2a5e);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(59, 158, 255, 0.3);
            animation: orbFloat 6s ease-in-out infinite, orbRotate 18s linear infinite;
            position: relative;
        }
        .orb::after {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, rgba(255,255,255,0.25), transparent 70%);
            animation: orbInner 5s ease-in-out infinite alternate;
        }
        @keyframes orbFloat {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-25px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        @keyframes orbRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes orbInner {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 1.5rem;
            padding: 2.5rem 0;
            border-top: 1px solid rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            margin: 4rem 0;
            animation: fadeInUp 1s ease 0.5s both;
        }
        .stat-item {
            text-align: center;
            transition: 0.3s;
        }
        .stat-item:hover {
            transform: translateY(-6px) scale(1.02);
        }
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0f4ff, #8bb4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: countPulse 3s infinite alternate;
        }
        @keyframes countPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.08); opacity: 1; }
        }
        .stat-label {
            color: #94a9d1;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .testimonials-section {
            margin: 4rem 0;
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 2rem;
            transition: 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
        }

        .testimonial-card:hover {
            transform: translateY(-8px);
            border-color: rgba(59, 158, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .testimonial-card .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            background: transparent;
            padding: 0;
            box-shadow: none;
            backdrop-filter: none;
            border: none;
            position: static;
        }

        .testimonial-card .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b9eff, #7c6af0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .testimonial-card .info .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f0f4ff;
        }

        .testimonial-card .info .cargo {
            font-size: 0.85rem;
            color: #94a9d1;
        }

        .testimonial-card .stars {
            color: #f59e0b;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: 3px;
        }

        .testimonial-card .stars .empty {
            color: #4a5a7a;
        }

        .testimonial-card .text {
            color: #b6c9ec;
            font-size: 1rem;
            line-height: 1.7;
            font-style: italic;
            flex-grow: 1;
            border-left: 3px solid #3b9eff;
            padding-left: 15px;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .testimonials-grid {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            margin-top: 4rem;
            padding: 2rem 0 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.03);
            color: #6a80aa;
            font-size: 0.9rem;
            animation: fadeInUp 1s ease 0.8s both;
        }
        .footer-social a {
            color: #6a80aa;
            text-decoration: none;
            transition: 0.25s;
            margin-left: 1.2rem;
        }
        .footer-social a:hover {
            color: #f0f4ff;
        }
        .footer-social i {
            font-size: 1.4rem;
            transition: 0.25s;
        }
        .footer-social a:hover i {
            color: #f0f4ff;
            transform: translateY(-4px) scale(1.1);
            text-shadow: 0 0 15px #3b9eff;
        }

        @media (max-width: 800px) {
            .hero-text h1 { font-size: 2.8rem; }
            .header { flex-wrap: wrap; gap: 0.8rem; justify-content: center; }
            .nav-links { gap: 1.2rem; flex-wrap: wrap; justify-content: center; }
            .testimonials-grid { grid-template-columns: 1fr; }
            .orb { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="particles-container">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
    </div>

    <div class="content" id="appContent">
        <div style="text-align:center; padding:50px; color:#4a5a7a;">
            <i class="fas fa-spinner fa-spin" style="font-size:3rem;"></i>
            <p style="margin-top:15px;">Cargando datos...</p>
        </div>
    </div>

    <script>
        const DATOS_POR_DEFECTO = {
            "config": {
                "nombre_sitio": "Metal Mecánica Bergesio",
                "logo": "🔧",
                "color_principal": "#3b9eff",
                "favicon": "🔧"
            },
            "menu": ["Inicio", "Servicios", "Tienda", "Contacto"],
            "pagina_inicio": {
                "badge": "🔥 Especialistas en carrozados",
                "titulo": "Carrozados de camiones y mantenimiento industrial",
                "titulo_destacado": "camiones, mantenimiento industrial",
                "colores_destacados": {
                    "camiones": "#f59e0b",
                    "mantenimiento industrial": "#34d399"
                },
                "descripcion": "Mantenimiento industrial, tornería, soldaduras en general, fabricación y reparaciones. Más de 15 años de experiencia brindando soluciones en metalmecánica.",
                "boton_principal": "Solicitar presupuesto",
                "boton_secundario": "Ver servicios",
                "stats": [
                    { "numero": "+15", "label": "Años de experiencia" },
                    { "numero": "+500", "label": "Trabajos realizados" },
                    { "numero": "98%", "label": "Clientes satisfechos" },
                    { "numero": "24/7", "label": "Atención y asesoramiento" }
                ],
                "testimonios": [
                    {
                        "nombre": "Carlos Rodríguez",
                        "cargo": "Transportista",
                        "texto": "Excelente trabajo en el carrozado de mi camión. Quedó como nuevo y con una estructura más resistente.",
                        "estrellas": 5,
                        "avatar": "C"
                    },
                    {
                        "nombre": "Marta Fernández",
                        "cargo": "Gerente de Planta Industrial",
                        "texto": "El mantenimiento preventivo que realizan es impecable. Nuestra maquinaria nunca había funcionado tan bien.",
                        "estrellas": 5,
                        "avatar": "M"
                    }
                ]
            },
            "contacto": {
                "email": "bergesiometalmecanica@gmail.com",
                "telefono": "+54 9 11 1234-5678",
                "direccion": "Avellaneda, Buenos Aires, Argentina",
                "horario_lunes_viernes": "8:00 - 18:00",
                "horario_sabado": "8:00 - 13:00",
                "sabado_activo": true,
                "mapa_embed": "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1283.2891835621442!2d-59.648334443528086!3d-29.110338276116135!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x944eba730d522473%3A0xf73aad570ce1412d!2sMetalmecanica%20BERGESIO!5e1!3m2!1ses-419!2sar!4v1783295788555!5m2!1ses-419!2sar"
            },
            "footer": {
                "texto": "© 2026 Metal Mecánica Bergesio · Calidad y experiencia en metalmecánica",
                "redes": [
                    { "nombre": "Facebook", "url": "https://www.facebook.com/profile.php?id=100063636831085", "icono": "fab fa-facebook" },
                    { "nombre": "WhatsApp", "url": "#", "icono": "fab fa-whatsapp" },
                    { "nombre": "Instagram", "url": "#", "icono": "fab fa-instagram" }
                ]
            }
        };

        let datos = null;
        let menuItems = [];

        async function cargarDatos() {
            try {
                const localData = localStorage.getItem('datos_bergesio');
                if (localData) {
                    try {
                        const parsed = JSON.parse(localData);
                        if (parsed) {
                            datos = parsed;
                            menuItems = parsed.menu || ["Inicio", "Servicios", "Tienda", "Contacto"];
                            renderizarPagina();
                            return;
                        }
                    } catch (e) {}
                }

                try {
                    const respuesta = await fetch('datos.json');
                    if (respuesta.ok) {
                        datos = await respuesta.json();
                        menuItems = datos.menu || ["Inicio", "Servicios", "Tienda", "Contacto"];
                        localStorage.setItem('datos_bergesio', JSON.stringify(datos));
                        renderizarPagina();
                        return;
                    }
                } catch (e) {}

                datos = DATOS_POR_DEFECTO;
                menuItems = datos.menu || ["Inicio", "Servicios", "Tienda", "Contacto"];
                localStorage.setItem('datos_bergesio', JSON.stringify(datos));
                renderizarPagina();

            } catch (error) {
                console.error('Error:', error);
                datos = DATOS_POR_DEFECTO;
                menuItems = datos.menu || ["Inicio", "Servicios", "Tienda", "Contacto"];
                localStorage.setItem('datos_bergesio', JSON.stringify(datos));
                renderizarPagina();
            }
        }

        function renderizarTitulo(titulo, palabrasDestacadas, colores) {
            if (!titulo) return '';
            
            let resultado = titulo;
            const palabras = palabrasDestacadas.split(',').map(p => p.trim()).filter(p => p);
            
            if (palabras.length === 0) return titulo;
            
            const coloresPorDefecto = ['#3b9eff', '#f59e0b', '#f472b6', '#34d399', '#a78bfa', '#ef4444'];
            
            palabras.forEach((palabra, index) => {
                const palabraEscapada = palabra.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const color = colores && colores[palabra] ? colores[palabra] : coloresPorDefecto[index % coloresPorDefecto.length];
                const regex = new RegExp(palabraEscapada, 'g');
                resultado = resultado.replace(regex, `<span class="highlight" style="--highlight-color:${color}; color:${color};">${palabra}</span>`);
            });
            
            return resultado;
        }

        function renderizarTestimonios(testimonios) {
            const container = document.getElementById('testimoniosGrid');
            if (!container) return;
            
            if (!testimonios || testimonios.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#4a5a7a; grid-column:1/-1;">
                        <i class="fas fa-comment" style="font-size:2rem; display:block; margin-bottom:10px;"></i>
                        <p>Pronto agregaremos testimonios de nuestros clientes</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = testimonios.map(t => {
                let estrellasHtml = '';
                for (let s = 1; s <= 5; s++) {
                    if (s <= t.estrellas) {
                        estrellasHtml += '<i class="fas fa-star"></i>';
                    } else {
                        estrellasHtml += '<i class="fas fa-star empty"></i>';
                    }
                }
                
                return `
                    <div class="testimonial-card">
                        <div class="header">
                            <div class="avatar">${t.avatar || t.nombre.charAt(0)}</div>
                            <div class="info">
                                <div class="name">${t.nombre}</div>
                                <div class="cargo">${t.cargo || ''}</div>
                                <div class="stars">${estrellasHtml}</div>
                            </div>
                        </div>
                        <div class="text">${t.texto || ''}</div>
                    </div>
                `;
            }).join('');
        }

        function renderizarPagina() {
            if (!datos) {
                datos = DATOS_POR_DEFECTO;
                localStorage.setItem('datos_bergesio', JSON.stringify(datos));
            }

            const config = datos.config || {};
            const inicio = datos.pagina_inicio || {};
            const footer = datos.footer || {};
            const colores = inicio.colores_destacados || {};
            const testimonios = inicio.testimonios || [];

            const tituloHtml = renderizarTitulo(
                inicio.titulo || 'Carrozados de camiones y mantenimiento industrial',
                inicio.titulo_destacado || '',
                colores
            );

            document.title = `${config.nombre_sitio || 'Metal Mecánica Bergesio'} · Inicio`;

            const menuHtml = menuItems.map(item => {
                const isActive = item === 'Inicio' ? 'active' : '';
                const link = item.toLowerCase() === 'inicio' ? 'index.html' : 
                           item.toLowerCase() === 'servicios' ? 'servicios.html' :
                           item.toLowerCase() === 'tienda' ? 'tienda.html' :
                           item.toLowerCase() === 'contacto' ? 'contacto.html' :
                           `${item.toLowerCase()}.html`;
                return `<a href="${link}" class="${isActive}">${item}</a>`;
            }).join('');

            const content = document.getElementById('appContent');

            content.innerHTML = `
                <header class="header">
                    <div class="logo">
                        <a href="index.html">
                            <span class="logo-icon">${config.logo || '🔧'}</span>
                            <span>${config.nombre_sitio || 'Metal Mecánica Bergesio'}</span>
                        </a>
                    </div>
                    <div class="nav-links">
                        ${menuHtml}
                    </div>
                    <a href="contacto.html" class="btn-outline">Contacto</a>
                </header>

                <section class="hero">
                    <div class="hero-text">
                        <div class="badge">
                            <i class="fas fa-fire" style="margin-right: 8px;"></i> ${inicio.badge || 'Especialistas en carrozados'}
                        </div>
                        <h1>${tituloHtml}</h1>
                        <p>${inicio.descripcion || 'Mantenimiento industrial, tornería, soldaduras en general...'}</p>
                        <div class="cta-group">
                            <a href="contacto.html" class="btn-primary">
                                <i class="fas fa-phone"></i> ${inicio.boton_principal || 'Solicitar presupuesto'}
                            </a>
                            <a href="servicios.html" class="btn-secondary">
                                <i class="fas fa-wrench"></i> ${inicio.boton_secundario || 'Ver servicios'}
                            </a>
                        </div>
                    </div>
                    <div class="hero-visual">
                        <div class="orb"></div>
                    </div>
                </section>

                <div class="stats">
                    ${(inicio.stats || []).map(stat => `
                        <div class="stat-item">
                            <div class="stat-number">${stat.numero}</div>
                            <div class="stat-label">${stat.label}</div>
                        </div>
                    `).join('')}
                </div>

                <div class="testimonials-section" id="testimoniosSection">
                    <h2 style="text-align:center; font-size:2.5rem; font-weight:700; margin-bottom:1rem; background:linear-gradient(135deg, #f0f4ff, #8bb4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">
                        Lo que dicen nuestros clientes
                    </h2>
                    <p style="text-align:center; color:#94a9d1; margin-bottom:3rem; font-size:1.1rem;">
                        Opiniones de quienes confían en nuestro trabajo
                    </p>
                    <div class="testimonials-grid" id="testimoniosGrid"></div>
                </div>

                <footer class="footer">
                    <span>${footer.texto || '© 2026 Metal Mecánica Bergesio · Calidad y experiencia'}</span>
                    <div class="footer-social">
                        ${(footer.redes || []).map(red => `
                            <a href="${red.url || '#'}" target="_blank"><i class="${red.icono || 'fab fa-facebook'}"></i></a>
                        `).join('')}
                    </div>
                </footer>
            `;

            renderizarTestimonios(testimonios);
        }

        document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>

</body>
</html>
